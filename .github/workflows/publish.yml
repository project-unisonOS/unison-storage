name: Publish container

on:
  push:
    branches: [ main, "release/**" ]
    tags: [ "v*" ]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  publish:
    uses: project-unisonOS/unison-platform/.github/workflows/reusable-build.yml@73cdf19d696bfc4e4df13f8403becb71c5d1ed38
    with:
      image_name: unison-storage
      domain: storage
      service_port: "8082"
    secrets: inherit
