name: Publish container

on:
  push:
    branches: [ main, "release/**" ]
    tags: [ "v*" ]

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write
  security-events: write

jobs:
  publish:
    uses: project-unisonOS/unison-platform/.github/workflows/reusable-build.yml@e91355e176f88cafe3fda8b9591322194c459c74
    with:
      image_name: unison-storage
      domain: storage
      service_port: "8082"
    secrets: inherit
